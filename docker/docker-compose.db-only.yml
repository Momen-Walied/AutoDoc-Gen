services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: autodocgen
      POSTGRES_PASSWORD: autodocgen
      POSTGRES_DB: autodocgen
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autodocgen -d autodocgen"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
